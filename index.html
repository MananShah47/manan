<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Date ☕</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:650px;
padding:40px;
border-radius:30px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
color:white;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.2);
z-index:2;
}

h1{
font-size:3rem;
margin-bottom:15px;
}

p{
font-size:1.2rem;
line-height:1.7;
}

button{
padding:14px 28px;
border:none;
border-radius:50px;
cursor:pointer;
margin:10px;
font-size:1rem;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.yes{
background:white;
color:#ff4f87;
font-weight:bold;
}

.maybe{
background:rgba(255,255,255,.2);
color:white;
position:relative;
}

.step{
display:none;
}

.active{
display:block;
}

input,textarea{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
}

textarea{
height:100px;
resize:none;
}

.emoji{
position:absolute;
font-size:24px;
opacity:.35;
animation:float linear infinite;
}

@keyframes float{
from{transform:translateY(120vh);}
to{transform:translateY(-150px);}
}

#success{
display:none;
}

.success-title{
font-size:2.5rem;
margin-bottom:15px;
}

.summary{
line-height:2;
font-size:1.1rem;
}

</style>
</head>

<body>

<div class="card">

<!-- STEP 1 -->
<div id="step1" class="step active">
<h1>Hey 😊</h1>
<p>I could have sent a text...<br>but this seemed more fun ☕</p>
<button class="yes" onclick="next(1,2)">Continue →</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step">
<h1>☕</h1>
<p>Would you be interested in a coffee and good conversation?</p>
<button class="yes" onclick="next(2,3)">Continue</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="step">
<h1>One Last Question ☕</h1>
<p>I’d love to grab a coffee with you sometime.</p>

<button class="yes" onclick="showForm()">
Yes 😊
</button>

<button class="maybe" id="maybeBtn">
Maybe 🤔
</button>

</div>

<!-- STEP 4 -->
<div id="step4" class="step">
<h1>Nice ✨</h1>
<p>Pick a date and time that works for you.</p>

<input type="date" id="date">
<input type="time" id="time">
<input type="text" id="place" placeholder="Favorite coffee place">
<textarea id="note" placeholder="Optional message"></textarea>

<button class="yes" onclick="confirmDate()">
Confirm ☕
</button>
</div>

<!-- SUCCESS -->
<div id="success">
<div class="success-title">
Coffee Plan Locked In ☕✨
</div>
<div id="summary" class="summary"></div>
</div>

</div>

<script>

function next(from,to){
document.getElementById('step'+from).classList.remove('active');
document.getElementById('step'+to).classList.add('active');
}

function showForm(){
next(3,4);
}

/* ===== MAYBE RUNAWAY BUTTON ===== */
const maybeBtn = document.getElementById("maybeBtn");

maybeBtn.addEventListener("mouseover", () => {

const x = Math.random() * 300 - 150;
const y = Math.random() * 180 - 90;

maybeBtn.style.transition = "0.2s ease";
maybeBtn.style.transform = `translate(${x}px, ${y}px)`;

});

/* fun text rotation */
const texts = [
"Maybe 🤔",
"Wait 😂",
"Not so fast ☕",
"I'm thinking 😌",
"Stop chasing me 😆",
"Okay okay maybe..."
];

let i = 0;

maybeBtn.addEventListener("mouseover", () => {
maybeBtn.innerText = texts[i];
i = (i + 1) % texts.length;
});

/* click behavior */
maybeBtn.addEventListener("click", () => {
maybeBtn.innerText = "Caught me 😳☕";
maybeBtn.style.transform = "scale(1.1)";

setTimeout(() => {
showForm();
}, 800);
});

/* CONFIRM */
function confirmDate(){

const date=document.getElementById('date').value;
const time=document.getElementById('time').value;
const place=document.getElementById('place').value;
const note=document.getElementById('note').value;

document.getElementById('step4').style.display='none';
document.getElementById('success').style.display='block';

document.getElementById('summary').innerHTML=`
📅 ${date}<br>
⏰ ${time}<br>
☕ ${place}<br>
💌 ${note}
`;

launchEffect();
}

/* floating emojis */
const icons=['☕','✨','🌟','😊'];

for(let i=0;i<25;i++){
const el=document.createElement('div');
el.className='emoji';
el.innerHTML=icons[Math.floor(Math.random()*icons.length)];
el.style.left=Math.random()*100+'vw';
el.style.animationDuration=(8+Math.random()*10)+'s';
el.style.animationDelay=Math.random()*5+'s';
document.body.appendChild(el);
}

/* confetti */
function launchEffect(){
const items=['🎉','✨','☕','🌟'];

for(let i=0;i<90;i++){
const c=document.createElement('div');
c.innerHTML=items[Math.floor(Math.random()*items.length)];
c.style.position='fixed';
c.style.left=Math.random()*100+'vw';
c.style.top='-20px';
c.style.fontSize=(18+Math.random()*20)+'px';
c.style.transition='3s linear';
document.body.appendChild(c);

setTimeout(()=>c.style.top='110vh',50);
setTimeout(()=>c.remove(),5000);
}
}

</script>

</body>
</html>
