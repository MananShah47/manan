<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Date ☕</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe3d3,#ffb199);
    font-family:Arial;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    max-width:500px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    font-size:2.2rem;
}

p{
    font-size:1.1rem;
    margin:15px 0;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
    font-size:1rem;
}

.yes{
    background:#22c55e;
    color:white;
}

.no{
    background:#ef4444;
    color:white;
    position:absolute;
}

#msg{
    margin-top:15px;
    display:none;
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
    <h1>☕ Hey!</h1>
    <p>Would you like to go for a coffee with me sometime?</p>

    <button class="yes" onclick="yes()">Yes 😊</button>
    <button class="no" id="noBtn">No 🙃</button>

    <div id="msg">Yay! Can’t wait 😊</div>
</div>

<script>
function yes(){
    document.getElementById("msg").style.display="block";
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", ()=>{
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
